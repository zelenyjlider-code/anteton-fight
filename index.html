<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pocket World: Powers & Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Consolas', monospace; background: #000; color: #00ffff; }
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn {
            padding: 15px 30px; border: 2px solid #00ffff; background: transparent;
            color: #00ffff; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.2s;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 20px #00ffff; }
        #network-panel { margin-top: 20px; padding: 20px; border: 1px solid #333; text-align: center; }
        input { background: #111; border: 1px solid #00ffff; color: #00ffff; padding: 10px; margin: 5px; outline: none; }
        
        #gui {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.8); padding: 15px; border: 1px solid #00ff00;
            pointer-events: none; visibility: hidden; z-index: 50;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>POCKET WORLD ONLINE</h1>
    <div class="btn-list">
        <button class="btn" onclick="selectChar('ANTETON')">Anteton</button>
        <button class="btn" onclick="selectChar('CLASSIC')">Classic</button>
        <button class="btn" onclick="selectChar('GLITCH')">Glitch</button>
        <button class="btn" onclick="selectChar('TV')">TV Anteton</button>
    </div>
    <div id="selected-label" style="margin-bottom: 10px;">Selected: None</div>

    <div id="network-panel">
        <button class="btn" onclick="hostGame()">Host Server</button>
        <p>— OR —</p>
        <input type="text" id="joinId" placeholder="Host ID">
        <button class="btn" onclick="joinGame()">Join</button>
        <div id="peer-id-display" style="margin-top: 15px; color: yellow;"></div>
    </div>
</div>

<div id="gui">
    <div id="char-name" style="font-size: 18px; color: #fff;">HERO: ---</div>
    <div id="status">STATUS: Connecting...</div>
    <hr style="border-color: #333;">
    <div>LMB: Attack | Q & E: Skills</div>
    <div>WASD: Move | SPACE: Jump</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CHARS = {
        ANTETON: { file: 'anteton.gltf', name: 'Anteton' },
        CLASSIC: { file: 'classic.gltf', name: 'Classic' },
        GLITCH: { file: 'glitch.gltf', name: 'Glitch' },
        TV: { file: 'tv_anteton.gltf', name: 'TV Anteton' }
    };

    let scene, camera, renderer, clock = new THREE.Clock();
    let playerModel, mixer, actions = {}, currentAction;
    let selectedType = null;
    let peer, conn, isHost = false;
    let move = { f: false, b: false, l: false, r: false };
    let cameraAzimuth = 0, cameraPolar = 0.8, isMouseDown = false;

    window.selectChar = (type) => {
        selectedType = type;
        document.getElementById('selected-label').innerText = "Selected: " + CHARS[type].name;
    };

    window.hostGame = () => {
        if(!selectedType) return alert("Select a character!");
        isHost = true;
        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = "ROOM ID: " + id;
            initGame();
        });
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });
    };

    window.joinGame = () => {
        if(!selectedType) return alert("Select a character!");
        const id = document.getElementById('joinId').value;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(id);
            setupConn();
            initGame();
        });
    };

    function setupConn() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "STATUS: Connected";
        });
        conn.on('data', (data) => {
            if(data.type === 'move') { /* Здесь будет логика отрисовки второго игрока */ }
        });
    }

    function initGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('gui').style.visibility = 'visible';
        document.getElementById('char-name').innerText = "HERO: " + CHARS[selectedType].name;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        loadPlayer();
        setupInput();
        animate();
    }

    function loadPlayer() {
        const loader = new GLTFLoader();
        loader.load(CHARS[selectedType].file, (gltf) => {
            playerModel = gltf.scene;
            scene.add(playerModel);
            
            mixer = new THREE.AnimationMixer(playerModel);
            gltf.animations.forEach(clip => {
                actions[clip.name] = mixer.clipAction(clip);
            });
            
            fadeTo('Idle');
        });
    }

    function fadeTo(name) {
        if (!actions[name]) return;
        const nextAction = actions[name];
        if (currentAction === nextAction) return;
        
        if (currentAction) currentAction.fadeOut(0.2);
        nextAction.reset().fadeIn(0.2).play();
        currentAction = nextAction;
    }

    function playActionOnce(name) {
        if (!actions[name]) return;
        const action = actions[name];
        action.reset().setLoop(THREE.LoopOnce).play();
        action.clampWhenFinished = true;
        
        mixer.addEventListener('finished', (e) => {
            if(e.action === action) fadeTo('Idle');
        });
    }

    function setupInput() {
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.f = true;
            if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true;
            if(e.code === 'KeyD') move.r = true;
            if(e.code === 'KeyQ') playActionOnce('Skill_Q');
            if(e.code === 'KeyE') playActionOnce('Skill_E');
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.f = false;
            if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false;
            if(e.code === 'KeyD') move.r = false;
        });
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) playActionOnce('Attack');
            isMouseDown = true;
        });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if(isMouseDown) {
                cameraAzimuth -= e.movementX * 0.01;
                cameraPolar = Math.max(0.1, Math.min(Math.PI/2.1, cameraPolar + e.movementY * 0.01));
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if(mixer) mixer.update(delta);

        if(playerModel) {
            const speed = 0.15;
            let isMoving = move.f || move.b || move.l || move.r;

            if(isMoving) {
                fadeTo('Walk');
                if(move.f) { 
                    playerModel.position.x -= Math.sin(cameraAzimuth)*speed; 
                    playerModel.position.z -= Math.cos(cameraAzimuth)*speed; 
                    playerModel.rotation.y = cameraAzimuth + Math.PI; 
                }
                if(move.b) {
                    playerModel.position.x += Math.sin(cameraAzimuth)*speed; 
                    playerModel.position.z += Math.cos(cameraAzimuth)*speed; 
                    playerModel.rotation.y = cameraAzimuth;
                }
            } else {
                if(currentAction === actions['Walk']) fadeTo('Idle');
            }

            // Sync Camera
            camera.position.x = playerModel.position.x + 10 * Math.sin(cameraAzimuth) * Math.cos(cameraPolar);
            camera.position.y = playerModel.position.y + 10 * Math.sin(cameraPolar) + 2;
            camera.position.z = playerModel.position.z + 10 * Math.cos(cameraAzimuth) * Math.cos(cameraPolar);
            camera.lookAt(playerModel.position.x, playerModel.position.y + 1.5, playerModel.position.z);

            if(conn && isMoving) {
                conn.send({ type: 'move', x: playerModel.position.x, z: playerModel.position.z, ry: playerModel.rotation.y });
            }
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
