<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Game: Pocket World</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Consolas', monospace; background: #000; }
        
        /* Menu */
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            padding: 20px 40px; border: 2px solid #00ffff; background: transparent;
            color: #00ffff; cursor: pointer; font-size: 18px; transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 30px #00ffff; }

        /* Game UI */
        #gui {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            background: rgba(0, 30, 0, 0.8); padding: 15px; border: 1px solid #00ff00;
            pointer-events: none; visibility: hidden; z-index: 50;
        }

        /* Pause */
        #pause-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 255, 0.1); display: none;
            border: 15px solid rgba(0, 255, 255, 0.2); 
            justify-content: center; align-items: center; z-index: 80; pointer-events: none;
        }
        .glitch-text { color: cyan; font-size: 50px; text-shadow: 3px 3px red; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: white; margin-bottom: 40px;">SELECT CHARACTER</h1>
    <div class="btn-list">
        <button class="btn" onclick="startGame('ANTETON')">Anteton</button>
        <button class="btn" onclick="startGame('CLASSIC')">Classic</button>
        <button class="btn" onclick="startGame('GLITCH')">Glitch</button>
        <button class="btn" onclick="startGame('TV')">TV Anteton</button>
    </div>
</div>

<div id="gui">
    <div id="char-name" style="font-size: 20px; font-weight: bold;">HERO: ---</div>
    <hr style="border: 0; border-top: 1px solid #00ff00;">
    <div>WASD - Move</div>
    <div>Hold Left Mouse - Orbit Camera</div>
    <div>P - THE GAME PAUSE</div>
</div>

<div id="pause-overlay">
    <div class="glitch-text">THE GAME: PAUSE</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CHARS = {
        ANTETON: { file: 'anteton.gltf', name: 'Anteton' },
        CLASSIC: { file: 'classic.gltf', name: 'Classic' },
        GLITCH: { file: 'glitch.gltf', name: 'Glitch' },
        TV: { file: 'tv_anteton.gltf', name: 'TV Anteton' }
    };

    let scene, camera, renderer, playerModel;
    let isPaused = false;
    let move = { f: false, b: false, l: false, r: false };
    
    // Camera Variables
    let isMouseDown = false;
    let cameraAzimuth = 0; 
    let cameraPolar = 1.0; 
    const cameraDistance = 8;

    const loader = new GLTFLoader();

    window.startGame = (type) => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('gui').style.visibility = 'visible';
        document.getElementById('char-name').innerText = "HERO: " + CHARS[type].name;
        setupWorld(type);
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // Ground
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // Yellow Houses
        createHouse(-15, 0); 
        createHouse(15, 0);

        // Events
        window.addEventListener('keydown', (e) => handleKey(e.code, true));
        window.addEventListener('keyup', (e) => handleKey(e.code, false));
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (isMouseDown && !isPaused) {
                cameraAzimuth -= e.movementX * 0.01;
                cameraPolar = Math.max(0.1, Math.min(Math.PI / 2.2, cameraPolar + e.movementY * 0.01));
            }
        });

        animate();
    }

    function createHouse(x, z) {
        const house = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 8), new THREE.MeshStandardMaterial({ color: 0xFFFF00 }));
        house.position.set(x, 3.5, z);
        scene.add(house);
    }

    function setupWorld(selectedType) {
        Object.keys(CHARS).forEach((key, index) => {
            loader.load(CHARS[key].file, (gltf) => {
                const model = gltf.scene;
                if (key === selectedType) {
                    playerModel = model;
                    playerModel.position.set(0, 0, 10);
                } else {
                    model.position.set((index - 1.5) * 6, 0, -10);
                }
                scene.add(model);
            }, undefined, () => {
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x555555}));
                if (key === selectedType) { playerModel = cube; playerModel.position.set(0, 1, 10); }
                else { cube.position.set((index - 1.5) * 6, 1, -10); }
                scene.add(cube);
            });
        });
    }

    function handleKey(code, val) {
        if (code === 'KeyW') move.f = val;
        if (code === 'KeyS') move.b = val;
        if (code === 'KeyA') move.l = val;
        if (code === 'KeyD') move.r = val;
        if (code === 'KeyP' && val) togglePause();
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
    }

    function animate() {
        requestAnimationFrame(animate);

        if (playerModel && !isPaused) {
            const speed = 0.15;
            let moved = false;
            let targetRotation = playerModel.rotation.y;

            // Move relative to camera azimuth
            if (move.f) {
                playerModel.position.x -= Math.sin(cameraAzimuth) * speed;
                playerModel.position.z -= Math.cos(cameraAzimuth) * speed;
                targetRotation = cameraAzimuth + Math.PI; // Look away from camera
                moved = true;
            }
            if (move.b) {
                playerModel.position.x += Math.sin(cameraAzimuth) * speed;
                playerModel.position.z += Math.cos(cameraAzimuth) * speed;
                targetRotation = cameraAzimuth; // Look at camera
                moved = true;
            }
            if (move.l) {
                playerModel.position.x -= Math.cos(cameraAzimuth) * speed;
                playerModel.position.z += Math.sin(cameraAzimuth) * speed;
                targetRotation = cameraAzimuth - Math.PI/2;
                moved = true;
            }
            if (move.r) {
                playerModel.position.x += Math.cos(cameraAzimuth) * speed;
                playerModel.position.z -= Math.sin(cameraAzimuth) * speed;
                targetRotation = cameraAzimuth + Math.PI/2;
                moved = true;
            }

            if(moved) playerModel.rotation.y = targetRotation;

            // Camera follow
            camera.position.x = playerModel.position.x + cameraDistance * Math.sin(cameraAzimuth) * Math.cos(cameraPolar);
            camera.position.y = playerModel.position.y + cameraDistance * Math.sin(cameraPolar);
            camera.position.z = playerModel.position.z + cameraDistance * Math.cos(cameraAzimuth) * Math.cos(cameraPolar);
            camera.lookAt(playerModel.position.x, playerModel.position.y + 1.5, playerModel.position.z);
        }

        renderer.render(scene, camera);
    }

    init();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
