<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>The Game: Pocket World Fighting</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Consolas', monospace; background: #000; }
        
        /* Меню выбора */
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            padding: 20px 40px; border: 2px solid #00ffff; background: transparent;
            color: #00ffff; cursor: pointer; font-size: 18px; transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 30px #00ffff; }

        /* Интерфейс игры */
        #gui {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            background: rgba(0, 30, 0, 0.8); padding: 15px; border: 1px solid #00ff00;
            pointer-events: none; visibility: hidden; z-index: 50;
        }

        /* Оверлей паузы */
        #pause-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 255, 0.1); display: none;
            border: 15px solid rgba(0, 255, 255, 0.2); 
            justify-content: center; align-items: center; z-index: 80;
            pointer-events: none;
        }
        .glitch-text { color: cyan; font-size: 50px; text-shadow: 3px 3px red; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: white; margin-bottom: 40px; filter: drop-shadow(0 0 10px cyan);">choose character</h1>
    <div class="btn-list">
        <button class="btn" onclick="startGame('ANTETON')">ANTETON</button>
        <button class="btn" onclick="startGame('CLASSIC')">CLASSIC</button>
        <button class="btn" onclick="startGame('GLITCH')">GLITCH</button>
        <button class="btn" onclick="startGame('TV')">TV ANTETON</button>
    </div>
</div>

<div id="gui">
    <div id="char-name" style="font-size: 20px; font-weight: bold;">ГЕРОЙ: ---</div>
    <hr style="border: 0; border-top: 1px solid #00ff00;">
    <div>W,A,S,D - Ходьба</div>
    <div>P - THE GAME ПАУЗА</div>
</div>

<div id="pause-overlay">
    <div class="glitch-text">THE GAME: ПАУЗА</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CHARS = {
        ANTETON: { file: 'anteton.gltf', name: 'Антетон' },
        CLASSIC: { file: 'classic.gltf', name: 'Классик' },
        GLITCH: { file: 'glitch.gltf', name: 'Глич' },
        TV: { file: 'tv_anteton.gltf', name: 'ТВ Антетон' }
    };

    let scene, camera, renderer, playerModel;
    let isPaused = false;
    let move = { f: false, b: false, l: false, r: false };
    const loader = new GLTFLoader();

    // Запуск игры после выбора
    window.startGame = (type) => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('gui').style.visibility = 'visible';
        document.getElementById('char-name').innerText = "ГЕРОЙ: " + CHARS[type].name;
        
        setupCharacters(type);
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо из книги

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Свет
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(ambient, sun);

        // Трава (Карманный мир)
        const grass = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x228B22 })
        );
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // Два квадратных желтых дома
        createHouse(-12, 0, "ЖИЛОЙ");
        createHouse(12, 0, "КАФЕТЕРИЙ");

        // Управление
        window.addEventListener('keydown', (e) => handleInput(e.code, true));
        window.addEventListener('keyup', (e) => handleInput(e.code, false));

        animate();
    }

    function createHouse(x, z, label) {
        const house = new THREE.Mesh(
            new THREE.BoxGeometry(7, 6, 7),
            new THREE.MeshStandardMaterial({ color: 0xFFFF00 })
        );
        house.position.set(x, 3, z);
        scene.add(house);
    }

    function setupCharacters(selectedType) {
        Object.keys(CHARS).forEach((key, index) => {
            loader.load(CHARS[key].file, (gltf) => {
                const model = gltf.scene;
                
                if (key === selectedType) {
                    playerModel = model;
                    playerModel.position.set(0, 0, 8);
                } else {
                    // Друзья стоят в стороне
                    model.position.set((index - 1.5) * 4, 0, -5);
                }
                scene.add(model);
            }, undefined, () => {
                // Заглушка, если модели еще не загружены на GitHub
                const placeholder = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 2, 1),
                    new THREE.MeshStandardMaterial({ color: key === 'GLITCH' ? 0x000000 : 0x800080 })
                );
                if (key === selectedType) {
                    playerModel = placeholder;
                    playerModel.position.set(0, 1, 8);
                } else {
                    placeholder.position.set((index - 1.5) * 4, 1, -5);
                }
                scene.add(placeholder);
            });
        });
    }

    function handleInput(code, state) {
        if (code === 'KeyW') move.f = state;
        if (code === 'KeyS') move.b = state;
        if (code === 'KeyA') move.l = state;
        if (code === 'KeyD') move.r = state;
        if (code === 'KeyP' && state) togglePause();
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
        scene.background = new THREE.Color(isPaused ? 0x113333 : 0x87CEEB);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (playerModel && !isPaused) {
            const speed = 0.12;
            if (move.f) playerModel.position.z -= speed;
            if (move.b) playerModel.position.z += speed;
            if (move.l) playerModel.position.x -= speed;
            if (move.r) playerModel.position.x += speed;

            // Камера за плечом
            camera.position.set(
                playerModel.position.x, 
                playerModel.position.y + 4, 
                playerModel.position.z + 8
            );
            camera.lookAt(playerModel.position);
        }

        renderer.render(scene, camera);
    }

    init();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
