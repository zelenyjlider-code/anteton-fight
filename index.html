<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Game: Pocket World - Definitive Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Consolas', monospace; background: #000; color: #00ffff; }
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn {
            padding: 15px 30px; border: 2px solid #00ffff; background: transparent;
            color: #00ffff; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.2s;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 20px #00ffff; }
        .mode-btn { border-color: #ff00ff; color: #ff00ff; margin-top: 10px; width: 100%; }
        .mode-btn:hover { background: #ff00ff; color: #000; box-shadow: 0 0 20px #ff00ff; }
        
        #network-panel { margin-top: 20px; padding: 15px; border: 1px dashed #555; text-align: center; }
        input { background: #111; border: 1px solid #00ffff; color: #00ffff; padding: 10px; margin: 5px; outline: none; }
        
        #gui {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.8); padding: 15px; border: 1px solid #00ff00;
            pointer-events: none; visibility: hidden; z-index: 50;
        }
        #peer-id-display { color: yellow; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>POCKET WORLD</h1>
    <div class="btn-list">
        <button class="btn" onclick="selectChar('ANTETON')">Anteton</button>
        <button class="btn" onclick="selectChar('CLASSIC')">Classic</button>
        <button class="btn" onclick="selectChar('GLITCH')">Glitch</button>
        <button class="btn" onclick="selectChar('TV')">TV Anteton</button>
    </div>
    <div id="selected-label">Selected: None</div>

    <div style="width: 340px;">
        <button class="btn mode-btn" onclick="startSingleplayer()">Play Singleplayer</button>
        
        <div id="network-panel">
            <button class="btn" style="font-size: 12px;" onclick="hostGame()">Host Online</button>
            <div style="margin: 5px 0; font-size: 12px;">— OR —</div>
            <input type="text" id="joinId" placeholder="Host ID" style="width: 120px;">
            <button class="btn" style="font-size: 12px;" onclick="joinGame()">Join</button>
            <div id="peer-id-display"></div>
        </div>
    </div>
</div>

<div id="gui">
    <div id="char-name" style="font-size: 18px; color: #fff; margin-bottom: 5px;">HERO: ---</div>
    <div id="game-status">MODE: Singleplayer</div>
    <hr style="border-color: #333;">
    <div style="font-size: 12px;">LMB: Attack | Q & E: Skills</div>
    <div style="font-size: 12px;">WASD: Move | SPACE: Jump</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CHARS = {
        ANTETON: { file: 'anteton.gltf', name: 'Anteton' },
        CLASSIC: { file: 'classic.gltf', name: 'Classic' },
        GLITCH: { file: 'glitch.gltf', name: 'Glitch' },
        TV: { file: 'tv_anteton.gltf', name: 'TV Anteton' }
    };

    let scene, camera, renderer, clock = new THREE.Clock();
    let playerModel, mixer, actions = {}, currentActionName = "";
    let selectedType = null;
    let peer, conn, isMultiplayer = false;
    
    // Physics & Movement
    let move = { f: false, b: false, l: false, r: false };
    let velocityY = 0, isGrounded = true;
    const gravity = -0.012, jumpPower = 0.25;

    // Camera
    let cameraAzimuth = 0, cameraPolar = 0.8, isMouseDown = false;

    // --- UI FUNCTIONS ---
    window.selectChar = (type) => {
        selectedType = type;
        document.getElementById('selected-label').innerText = "Selected: " + CHARS[type].name;
    };

    window.startSingleplayer = () => {
        if(!selectedType) return alert("Select a character!");
        isMultiplayer = false;
        initGame();
    };

    window.hostGame = () => {
        if(!selectedType) return alert("Select a character!");
        isMultiplayer = true;
        document.getElementById('peer-id-display').innerText = "Connecting to PeerJS...";
        
        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = "ID: " + id;
            document.getElementById('game-status').innerText = "MODE: Host";
            initGame();
        });
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });
        peer.on('error', (err) => alert("Network Error: " + err.type));
    };

    window.joinGame = () => {
        if(!selectedType) return alert("Select a character!");
        const id = document.getElementById('joinId').value;
        if(!id) return alert("Enter Host ID!");
        
        isMultiplayer = true;
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(id);
            setupConn();
            document.getElementById('game-status').innerText = "MODE: Client";
            initGame();
        });
    };

    function setupConn() {
        conn.on('data', (data) => {
            // Future logic for remote player
        });
    }

    // --- CORE GAME ---
    function initGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('gui').style.visibility = 'visible';
        document.getElementById('char-name').innerText = "HERO: " + CHARS[selectedType].name;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        loadPlayer();
        setupInput();
        animate();
    }

    function loadPlayer() {
        const loader = new GLTFLoader();
        loader.load(CHARS[selectedType].file, (gltf) => {
            playerModel = gltf.scene;
            scene.add(playerModel);
            
            mixer = new THREE.AnimationMixer(playerModel);
            gltf.animations.forEach(clip => {
                actions[clip.name] = mixer.clipAction(clip);
            });
            
            fadeTo('Idle');
        }, undefined, () => {
            // Fallback if file missing
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshStandardMaterial({color: 0x555555});
            playerModel = new THREE.Mesh(geo, mat);
            playerModel.position.y = 1;
            scene.add(playerModel);
        });
    }

    function fadeTo(name) {
        if (!actions[name] || currentActionName === name) return;
        const nextAction = actions[name];
        if (actions[currentActionName]) actions[currentActionName].fadeOut(0.2);
        nextAction.reset().fadeIn(0.2).play();
        currentActionName = name;
    }

    function playActionOnce(name) {
        if (!actions[name]) return;
        const action = actions[name];
        action.reset().setLoop(THREE.LoopOnce).play();
        action.clampWhenFinished = true;
        
        const onFinish = (e) => {
            if(e.action === action) {
                mixer.removeEventListener('finished', onFinish);
                fadeTo('Idle');
            }
        };
        mixer.addEventListener('finished', onFinish);
    }

    function setupInput() {
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.f = true;
            if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true;
            if(e.code === 'KeyD') move.r = true;
            if(e.code === 'Space' && isGrounded) { velocityY = jumpPower; isGrounded = false; playActionOnce('Jump'); }
            if(e.code === 'KeyQ') playActionOnce('Skill_Q');
            if(e.code === 'KeyE') playActionOnce('Skill_E');
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.f = false;
            if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false;
            if(e.code === 'KeyD') move.r = false;
        });
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) playActionOnce('Attack');
            isMouseDown = true;
        });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if(isMouseDown) {
                cameraAzimuth -= e.movementX * 0.01;
                cameraPolar = Math.max(0.1, Math.min(Math.PI/2.1, cameraPolar + e.movementY * 0.01));
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if(mixer) mixer.update(delta);

        if(playerModel) {
            const speed = 0.18;
            let moving = move.f || move.b || move.l || move.r;

            if(moving && isGrounded) {
                fadeTo('Walk');
                if(move.f) { 
                    playerModel.position.x -= Math.sin(cameraAzimuth)*speed; 
                    playerModel.position.z -= Math.cos(cameraAzimuth)*speed; 
                    playerModel.rotation.y = cameraAzimuth + Math.PI; 
                }
                if(move.b) {
                    playerModel.position.x += Math.sin(cameraAzimuth)*speed; 
                    playerModel.position.z += Math.cos(cameraAzimuth)*speed; 
                    playerModel.rotation.y = cameraAzimuth;
                }
                if(move.l) {
                    playerModel.position.x -= Math.cos(cameraAzimuth)*speed; 
                    playerModel.position.z += Math.sin(cameraAzimuth)*speed;
                    playerModel.rotation.y = cameraAzimuth - Math.PI/2;
                }
                if(move.r) {
                    playerModel.position.x += Math.cos(cameraAzimuth)*speed; 
                    playerModel.position.z -= Math.sin(cameraAzimuth)*speed;
                    playerModel.rotation.y = cameraAzimuth + Math.PI/2;
                }
            } else if (isGrounded && currentActionName === 'Walk') {
                fadeTo('Idle');
            }

            // Gravity
            playerModel.position.y += velocityY;
            if (playerModel.position.y > 0) {
                velocityY += gravity;
                isGrounded = false;
            } else {
                playerModel.position.y = 0;
                velocityY = 0;
                isGrounded = true;
            }

            // Camera Sync
            const dist = 10;
            camera.position.x = playerModel.position.x + dist * Math.sin(cameraAzimuth) * Math.cos(cameraPolar);
            camera.position.y = playerModel.position.y + dist * Math.sin(cameraPolar) + 2;
            camera.position.z = playerModel.position.z + dist * Math.cos(cameraAzimuth) * Math.cos(cameraPolar);
            camera.lookAt(playerModel.position.x, playerModel.position.y + 1.5, playerModel.position.z);
            
            // Network Sync
            if(isMultiplayer && conn && moving) {
                conn.send({ type: 'move', x: playerModel.position.x, z: playerModel.position.z, ry: playerModel.rotation.y, anim: currentActionName });
            }
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
